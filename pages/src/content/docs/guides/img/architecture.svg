<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f7f9ff"/>
            <stop offset="100%" stop-color="#eef1f8"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
        </filter>

        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <style>
            text {
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            }

            .flow {
            stroke-dasharray: 10;
            animation: dash 2.2s linear infinite;
            }

            @keyframes dash {
            to { stroke-dashoffset: -40; }
            }
        </style>

    </defs>

    <!-- 背景 -->
    <rect width="1200" height="760" fill="url(#bg)"/>

    <!-- 标题 -->
    <text x="600" y="45" text-anchor="middle" font-size="24" fill="#333" font-weight="bold">
        Feat 架构模型
    </text>

    <!-- ================= CLOUD ================= -->
    <g filter="url(#shadow)">
        <rect x="120" y="120" width="380" height="170" rx="18" fill="#e8f1ff"/>
        <text x="310" y="165" text-anchor="middle" font-size="26" fill="#1f6fff" font-weight="bold">Feat Cloud</text>
        <text x="310" y="200" text-anchor="middle" font-size="16" fill="#333">应用开发层</text>
        <text x="310" y="230" text-anchor="middle" font-size="14" fill="#666">MVC ｜ DI ｜ 配置体系</text>
    </g>

    <!-- ================= AI ================= -->
    <g filter="url(#shadow)">
        <rect x="700" y="120" width="380" height="170" rx="18" fill="#ffe6f3"/>
        <text x="890" y="165" text-anchor="middle" font-size="26" fill="#ff2d75" font-weight="bold">Feat AI</text>
        <text x="890" y="200" text-anchor="middle" font-size="16" fill="#333">智能能力扩展层</text>
        <text x="890" y="230" text-anchor="middle" font-size="14" fill="#666">依赖 Core HTTP Client</text>
    </g>

    <!-- ================= CORE ================= -->
    <g filter="url(#glow)">
        <rect x="360" y="340" width="480" height="200" rx="22" fill="#eaeaea" stroke="#cfcfcf"/>
        <text x="600" y="405" text-anchor="middle" font-size="32" fill="#111" font-weight="bold">Feat Core</text>
        <text x="600" y="445" text-anchor="middle" font-size="16" fill="#444">
            HTTP 运行内核 ｜ 路由 ｜ 调度 ｜ Client / Server
        </text>
        <text x="600" y="480" text-anchor="middle" font-size="14" fill="#666">
            系统唯一运行中心
        </text>
    </g>

    <!-- ================= smart-socket (F O U N D A T I O N) ================= -->
    <g filter="url(#shadow)">
        <rect x="260" y="600" width="680" height="90" rx="18" fill="#f7f7f7"/>
        <text x="600" y="640" text-anchor="middle" font-size="24" fill="#333" font-weight="bold">smart-socket</text>
        <text x="600" y="665" text-anchor="middle" font-size="14" fill="#666">IO 原语层 ｜ 网络通信底座（Foundation Layer）</text>
    </g>

    <!-- ================= CONNECTIONS ================= -->

    <!-- Cloud → Core -->
    <line x1="310" y1="290" x2="520" y2="340"
          stroke="#7aa7ff" stroke-width="2" class="flow"/>

    <!-- AI → Core -->
    <line x1="890" y1="290" x2="680" y2="340"
          stroke="#ff7ab8" stroke-width="2" class="flow"/>

    <!-- Core → smart-socket -->
    <line x1="600" y1="540" x2="600" y2="600"
          stroke="#999" stroke-width="2" class="flow"/>

</svg>