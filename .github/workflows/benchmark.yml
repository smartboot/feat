name: 框架性能基准测试

on:
  # 在master分支的推送和PR时触发
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      
      - name: 设置Maven
        uses: stCarolas/setup-maven@v5
      
      - name: 安装wrk
        run: sudo apt-get update && sudo apt-get install -y wrk
      
      - name: 构建项目
        run: FEAT_LICENSE=${{ secrets.FEAT_LICENSE }} mvn -B install --file pom.xml -DskipTests -Dmaven.compiler.source=8 -Dmaven.compiler.target=8

      - name: 解压 Quarkus
        run: |
          cd feat-test
          unzip -xzf quarkus-app.zip
      
      - name: 启动框架服务
        run: |
          cd feat-test
          mkdir -p target/wrk-results
          
          # 启动Feat服务（端口8082）
          nohup mvn exec:java -Dexec.mainClass="tech.smartboot.feat.demo.benchmark.FeatApp" > feat.log 2>&1 &
          echo "Feat服务已启动，等待5秒..."
          sleep 5
          
          # 启动Vert.x服务（端口8081）
          nohup mvn exec:java -Dexec.mainClass="tech.smartboot.feat.demo.benchmark.VertxApp" > vertx.log 2>&1 &
          echo "Vert.x服务已启动，等待5秒..."
          sleep 5
          
          # 启动Spring Boot服务（端口8080）
          nohup mvn exec:java -Dexec.mainClass="tech.smartboot.feat.demo.benchmark.SpringBootApp" > springboot.log 2>&1 &
          echo "Spring Boot服务已启动，等待5秒..."
          sleep 5
          
          # 启动Quarkus服务（端口8083）
          nohup java "-Dquarkus.http.port=8083" -jar quarkus-run.jar > quarkus.log 2>&1 &
          echo "Quarkus服务已启动，等待5秒..."
          cat quarkus.log
          sleep 5
          

      - name: 创建测试结果目录
        run: mkdir -p feat-test/target/wrk-results

      - name: 测试Quarkus Hello World接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8083/hello > target/wrk-results/quarkus-hello.txt
          echo "Quarkus Hello World测试完成"
      - name: 测试Quarkus JSON接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8083/json > target/wrk-results/quarkus-json.txt
          echo "Quarkus JSON测试完成"

      - name: 测试Feat Hello World接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8082/hello > target/wrk-results/feat-hello.txt
          echo "Feat Hello World测试完成"

      - name: 测试Feat JSON接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8082/json > target/wrk-results/feat-json.txt
          echo "Feat JSON测试完成"

      - name: 测试Vert.x Hello World接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8081/hello > target/wrk-results/vertx-hello.txt
          echo "Vert.x Hello World测试完成"

      - name: 测试Vert.x JSON接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8081/json > target/wrk-results/vertx-json.txt
          echo "Vert.x JSON测试完成"

      - name: 测试Spring Boot Hello World接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8080/hello > target/wrk-results/springboot-hello.txt
          echo "Spring Boot Hello World测试完成"

      - name: 测试Spring Boot JSON接口
        run: |
          cd feat-test
          wrk -t4 -c100 -d60s --latency http://localhost:8080/json > target/wrk-results/springboot-json.txt
          echo "Spring Boot JSON测试完成"
      
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas
      
      - name: 生成性能报告
        run: |
          cd feat-test
          python generate_benchmark_report.py
          echo "性能报告生成完成"
      
      - name: 上传性能报告
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: feat-test/target/benchmark-report/
          retention-days: 30
