<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动推广类文章封面模板 - 900×383</title>
    <style>
        :root {
            --feat-primary: #db2777;
            --feat-primary-light: #ec4899;
            --feat-primary-dark: #be185d;
            --feat-secondary: #64748b;
            --feat-accent: #8b5cf6;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 383px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--feat-primary) 0%, var(--feat-primary-dark) 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .title {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 16px;
            max-width: 700px;
        }
        
        .info-grid {
            display: flex;
            gap: 24px;
            margin-top: 20px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 18px;
            border-radius: 8px;
        }
        
        .info-icon {
            font-size: 20px;
        }
        
        .info-content {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
        }
        
        .info-value {
            font-size: 14px;
            color: #ffffff;
            font-weight: 600;
        }
        
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            color: var(--feat-primary);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 24px;
            width: fit-content;
        }
        
        .cta-arrow {
            font-size: 16px;
        }
        
        .brand {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        <div class="decoration"></div>
        
        <span class="tag">线上活动</span>
        
        <h1 class="title">Feat 开发者大会 2024</h1>
        
        <div class="info-grid">
            <div class="info-item">
                <span class="info-icon">📅</span>
                <div class="info-content">
                    <span class="info-label">活动时间</span>
                    <span class="info-value">2024年3月15日 14:00</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-icon">📍</span>
                <div class="info-content">
                    <span class="info-label">活动地点</span>
                    <span class="info-value">线上直播</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-icon">🎁</span>
                <div class="info-content">
                    <span class="info-label">参与福利</span>
                    <span class="info-value">精美礼品 + 证书</span>
                </div>
            </div>
        </div>
        
        <div class="cta">
            <span>立即报名</span>
            <span class="cta-arrow">→</span>
        </div>
        
        <div class="brand">
            <div class="brand-logo">F</div>
            <span class="brand-name">Feat</span>
        </div>
    </div>
</body>
</html>
