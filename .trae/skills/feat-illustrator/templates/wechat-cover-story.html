<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事类文章封面模板 - 900×383</title>
    <style>
        :root {
            --feat-primary: #059669;
            --feat-primary-light: #10b981;
            --feat-primary-dark: #047857;
            --feat-secondary: #64748b;
            --feat-accent: #f97316;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 383px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--feat-primary) 0%, var(--feat-primary-dark) 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .title {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 12px;
            max-width: 700px;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            line-height: 1.5;
            max-width: 600px;
        }
        
        .timeline {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 24px;
        }
        
        .timeline-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .timeline-dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
        
        .timeline-line {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .timeline-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .brand {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        <div class="decoration"></div>
        
        <span class="tag">技术故事</span>
        
        <h1 class="title">从 0 到 1：我的开源项目成长之路</h1>
        
        <p class="subtitle">一个程序员的创业故事，从个人项目到 10K Star 的心路历程</p>
        
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <span class="timeline-text">2020 创始</span>
            </div>
            <div class="timeline-line"></div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <span class="timeline-text">2022 突破</span>
            </div>
            <div class="timeline-line"></div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <span class="timeline-text">2024 成功</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-logo">F</div>
            <span class="brand-name">Feat</span>
        </div>
    </div>
</body>
</html>
