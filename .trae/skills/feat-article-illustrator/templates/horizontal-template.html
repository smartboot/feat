<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>横向图片模板 - 1280×720</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "Segoe UI", 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                Roboto, 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0f;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        .container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(240, 147, 251, 0.2) 0%, transparent 60%),
                linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }
        
        .title {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            filter: drop-shadow(0 8px 20px rgba(102, 126, 234, 0.4));
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 0.01em;
            line-height: 1.3;
        }
        
        .content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            position: relative;
            z-index: 1;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .card-icon {
            font-size: 36px;
            margin-bottom: 12px;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        
        .card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            font-weight: 400;
        }
        
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            pointer-events: none;
        }
        
        .decoration-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -80px;
            right: -80px;
        }
        
        .decoration-2 {
            width: 260px;
            height: 260px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: -60px;
            left: -60px;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
        }
        
        .footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        
        <div class="header">
            <h1 class="title">横向图片模板</h1>
            <p class="subtitle">1280×720 像素 · 16:9 宽高比 · 方便一屏截图</p>
        </div>
        
        <div class="content">
            <div class="card">
                <div class="card-icon">🖥️</div>
                <div class="card-title">桌面端优化</div>
                <div class="card-desc">专为桌面设备设计，适合横屏浏览和展示</div>
            </div>
            
            <div class="card">
                <div class="card-icon">🎨</div>
                <div class="card-title">艺术化设计</div>
                <div class="card-desc">专业级视觉效果，渐变、光影、玻璃态效果</div>
            </div>
            
            <div class="card">
                <div class="card-icon">📐</div>
                <div class="card-title">严格尺寸</div>
                <div class="card-desc">固定1280×720像素，确保截图一致性</div>
            </div>
            
            <div class="card">
                <div class="card-icon">✨</div>
                <div class="card-title">中文字体优化</div>
                <div class="card-desc">苹方、冬青黑体、微软雅黑，清晰美观</div>
            </div>
            
            <div class="card">
                <div class="card-icon">🎯</div>
                <div class="card-title">视觉层次</div>
                <div class="card-desc">大小、颜色、位置层次分明，重点突出</div>
            </div>
            
            <div class="card">
                <div class="card-icon">🌈</div>
                <div class="card-title">配色方案</div>
                <div class="card-desc">专业配色，60-30-10法则，视觉协调</div>
            </div>
        </div>
        
        <div class="footer">
            <p class="footer-text">Feat 文章插图生成专家 · 专业级横向图片模板</p>
        </div>
    </div>
</body>
</html>
