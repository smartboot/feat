<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纵向图片模板 - 简约风格</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #6b7280;
            --accent: #3b82f6;
            --neutral-light: #ffffff;
            --neutral-mid: #e5e7eb;
            --neutral-dark: #374151;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "Segoe UI", 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 720px;
            height: 1280px;
            position: relative;
            overflow: hidden;
            background: var(--neutral-light);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        
        .title {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 16px;
            color: var(--secondary);
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.3;
        }
        
        .divider {
            width: 60px;
            height: 3px;
            background: var(--accent);
            margin: 16px auto;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }
        
        .card {
            background: var(--neutral-light);
            border: 2px solid var(--neutral-mid);
            border-radius: 6px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--primary);
            border-width: 3px;
        }
        
        .card.primary {
            border-color: var(--primary);
            border-width: 3px;
        }
        
        .card.secondary {
            border-color: var(--secondary);
            border-width: 2px;
        }
        
        .card-icon {
            font-size: 28px;
            margin-bottom: 12px;
            display: block;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        
        .card-desc {
            font-size: 13px;
            color: var(--secondary);
            line-height: 1.6;
            font-weight: 400;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid var(--neutral-mid);
            position: relative;
        }
        
        .footer-text {
            font-size: 12px;
            color: var(--secondary);
            font-weight: 400;
        }
        
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-lines"></div>
        
        <div class="header">
            <h1 class="title">纵向图片模板</h1>
            <div class="divider"></div>
            <p class="subtitle">720×1280 像素 · 简约风格 · 线条层次</p>
        </div>
        
        <div class="content">
            <div class="card primary">
                <span class="card-icon">📱</span>
                <div class="card-title">移动端优化</div>
                <div class="card-desc">专为移动设备设计，适合竖屏浏览和分享</div>
            </div>
            
            <div class="card secondary">
                <span class="card-icon">🎨</span>
                <div class="card-title">简约配色</div>
                <div class="card-desc">不超过3种主色调，搭配中性色，视觉简洁专业</div>
            </div>
            
            <div class="card">
                <span class="card-icon">✏️</span>
                <div class="card-title">线条层次</div>
                <div class="card-desc">通过粗细、虚实、方向营造视觉层次感</div>
            </div>
            
            <div class="card secondary">
                <span class="card-icon">📐</span>
                <div class="card-title">严格尺寸</div>
                <div class="card-desc">固定720×1280像素，9:16宽高比，确保截图一致性</div>
            </div>
            
            <div class="card primary">
                <span class="card-icon">✨</span>
                <div class="card-title">留白空间</div>
                <div class="card-desc">增加元素间距，提升呼吸感，避免拥挤</div>
            </div>
        </div>
        
        <div class="footer">
            <p class="footer-text">Feat 文章插图生成专家 · 简约风格纵向图片模板</p>
        </div>
    </div>
</body>
</html>
