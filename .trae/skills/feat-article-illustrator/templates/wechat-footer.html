<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号尾图模板 - 900×200</title>
    <style>
        :root {
            --feat-primary: #2563eb;
            --feat-primary-light: #3b82f6;
            --feat-primary-dark: #1d4ed8;
            --feat-secondary: #64748b;
            --feat-accent: #f59e0b;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 200px;
            position: relative;
            overflow: hidden;
            background: var(--neutral-50);
            border-top: 3px solid var(--feat-primary);
            padding: 0 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--feat-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-info {
            display: flex;
            flex-direction: column;
        }
        
        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--neutral-900);
            margin-bottom: 4px;
        }
        
        .brand-desc {
            font-size: 12px;
            color: var(--neutral-500);
        }
        
        .center {
            display: flex;
            gap: 24px;
        }
        
        .link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--neutral-600);
            font-size: 13px;
            font-weight: 500;
        }
        
        .link-icon {
            width: 20px;
            height: 20px;
            background: var(--neutral-100);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .qr-placeholder {
            width: 64px;
            height: 64px;
            background: var(--neutral-100);
            border: 2px solid var(--neutral-200);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--neutral-500);
        }
        
        .qr-label {
            font-size: 10px;
            color: var(--neutral-500);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.015) 1px, transparent 1px);
            background-size: 25px 25px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        
        <div class="left">
            <div class="brand-logo">F</div>
            <div class="brand-info">
                <div class="brand-name">Feat Framework</div>
                <div class="brand-desc">高性能 Java Web 框架</div>
            </div>
        </div>
        
        <div class="center">
            <div class="link">
                <span class="link-icon">📖</span>
                <span>官方文档</span>
            </div>
            <div class="link">
                <span class="link-icon">⭐</span>
                <span>GitHub</span>
            </div>
            <div class="link">
                <span class="link-icon">💬</span>
                <span>社区交流</span>
            </div>
        </div>
        
        <div class="right">
            <div class="qr-placeholder">二维码</div>
            <span class="qr-label">扫码关注</span>
        </div>
    </div>
</body>
</html>
