<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观点类文章封面模板 - 900×383</title>
    <style>
        :root {
            --feat-primary: #dc2626;
            --feat-primary-light: #ef4444;
            --feat-primary-dark: #b91c1c;
            --feat-secondary: #64748b;
            --feat-accent: #f59e0b;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 383px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--feat-primary) 0%, var(--feat-primary-dark) 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .quote-mark {
            font-size: 72px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.2);
            line-height: 1;
            margin-bottom: -20px;
        }
        
        .title {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-bottom: 16px;
            max-width: 700px;
            font-style: italic;
        }
        
        .author {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        .author-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .author-info {
            display: flex;
            flex-direction: column;
        }
        
        .author-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .author-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .brand {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        <div class="decoration"></div>
        
        <span class="tag">观点评论</span>
        
        <div class="quote-mark">"</div>
        
        <h1 class="title">为什么我认为微服务不是银弹</h1>
        
        <div class="author">
            <div class="author-avatar">张</div>
            <div class="author-info">
                <span class="author-name">张三</span>
                <span class="author-title">资深架构师 · 10年经验</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-logo">F</div>
            <span class="brand-name">Feat</span>
        </div>
    </div>
</body>
</html>
