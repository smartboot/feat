<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态机图 - 手绘风格</title>
    <style>
        :root {
            --art-warm-cream: #fef9f3;
            --art-soft-pink: #fce4ec;
            --art-lavender: #f3e5f5;
            --art-mint: #e8f5e9;
            --art-peach: #fff3e0;
            --art-sky: #e3f2fd;
            --art-primary: #6b5b95;
            --art-secondary: #f7cac9;
            --art-accent: #88b04b;
            --art-highlight: #ff6f61;
            --art-line: #5d4e37;
            --art-line-light: #8b7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .container {
            width: 900px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background: var(--art-warm-cream);
            padding: 30px 40px;
        }
        
        .sketch-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 3px solid var(--art-line);
            border-radius: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--art-line);
        }
        
        .subtitle {
            font-size: 13px;
            color: var(--art-line-light);
            margin-top: 6px;
        }
        
        .state-machine {
            position: relative;
            height: calc(100% - 80px);
            z-index: 1;
        }
        
        .state {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .state-circle {
            width: 100px;
            height: 100px;
            border: 3px solid var(--art-line);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            position: relative;
        }
        
        .state-circle.initial {
            background: var(--art-sky);
            border-width: 4px;
        }
        
        .state-circle.active {
            background: var(--art-lavender);
            border-color: var(--art-primary);
        }
        
        .state-circle.waiting {
            background: var(--art-peach);
        }
        
        .state-circle.final {
            background: var(--art-mint);
            border-width: 4px;
        }
        
        .state-circle.final::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 3px solid var(--art-line);
            border-radius: 50%;
        }
        
        .state-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        
        .state-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--art-line);
            text-align: center;
        }
        
        .state-label {
            margin-top: 8px;
            font-size: 10px;
            color: var(--art-line-light);
            background: var(--art-warm-cream);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px dashed var(--art-line-light);
        }
        
        .transition {
            position: absolute;
            display: flex;
            align-items: center;
        }
        
        .transition-line {
            height: 2px;
            background: var(--art-line);
            position: relative;
        }
        
        .transition-arrow {
            font-size: 14px;
            color: var(--art-line);
            position: absolute;
            right: -8px;
            top: -7px;
        }
        
        .transition-label {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--art-primary);
            background: var(--art-warm-cream);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .initial-point {
            position: absolute;
            width: 24px;
            height: 24px;
            background: var(--art-line);
            border-radius: 50%;
        }
        
        .initial-point::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 2px;
            background: var(--art-line);
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .initial-point::before {
            content: '▶';
            position: absolute;
            right: -48px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--art-line);
        }
        
        .self-loop {
            position: absolute;
            width: 60px;
            height: 40px;
            border: 2px solid var(--art-line);
            border-bottom: none;
            border-radius: 30px 30px 0 0;
        }
        
        .self-loop-arrow {
            position: absolute;
            font-size: 12px;
            color: var(--art-line);
            top: 36px;
            left: 50%;
            transform: translateX(-50%) rotate(90deg);
        }
        
        .self-loop-label {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--art-primary);
            background: var(--art-warm-cream);
            padding: 1px 4px;
            border-radius: 3px;
            white-space: nowrap;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            left: 40px;
            display: flex;
            gap: 16px;
            font-size: 10px;
            color: var(--art-line-light);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--art-line);
        }
        
        .legend-dot.initial { background: var(--art-sky); }
        .legend-dot.active { background: var(--art-lavender); }
        .legend-dot.waiting { background: var(--art-peach); }
        .legend-dot.final { background: var(--art-mint); }
        
        .deco {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
        }
        
        .brand {
            position: absolute;
            bottom: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--art-line-light);
            z-index: 1;
        }
        
        .brand-icon {
            width: 24px;
            height: 24px;
            background: var(--art-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            border: 2px solid var(--art-line);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sketch-border"></div>
        
        <span class="deco" style="top: 30px; left: 30px;">🔄</span>
        <span class="deco" style="top: 35px; right: 35px;">⚡</span>
        <span class="deco" style="bottom: 50px; left: 35px;">🔀</span>
        <span class="deco" style="bottom: 45px; right: 30px;">✨</span>
        
        <div class="header">
            <h1 class="title">HTTP 请求状态机</h1>
            <p class="subtitle">请求处理的完整生命周期</p>
        </div>
        
        <div class="state-machine">
            <div class="initial-point" style="top: 180px; left: 40px;"></div>
            
            <div class="state" style="top: 140px; left: 100px;">
                <div class="state-circle initial">
                    <span class="state-icon">📥</span>
                    <span class="state-name">Idle</span>
                </div>
                <span class="state-label">初始状态</span>
            </div>
            
            <div class="state" style="top: 140px; left: 280px;">
                <div class="state-circle active">
                    <span class="state-icon">🔗</span>
                    <span class="state-name">Connecting</span>
                </div>
                <span class="state-label">建立连接</span>
            </div>
            
            <div class="state" style="top: 140px; left: 460px;">
                <div class="state-circle active">
                    <span class="state-icon">📤</span>
                    <span class="state-name">Sending</span>
                </div>
                <span class="state-label">发送请求</span>
                <div class="self-loop" style="top: -20px; left: 20px;">
                    <span class="self-loop-label">重试</span>
                    <span class="self-loop-arrow">▶</span>
                </div>
            </div>
            
            <div class="state" style="top: 140px; left: 640px;">
                <div class="state-circle waiting">
                    <span class="state-icon">⏳</span>
                    <span class="state-name">Waiting</span>
                </div>
                <span class="state-label">等待响应</span>
            </div>
            
            <div class="state" style="top: 340px; left: 640px;">
                <div class="state-circle active">
                    <span class="state-icon">📥</span>
                    <span class="state-name">Receiving</span>
                </div>
                <span class="state-label">接收数据</span>
            </div>
            
            <div class="state" style="top: 340px; left: 460px;">
                <div class="state-circle final">
                    <span class="state-icon">✅</span>
                    <span class="state-name">Completed</span>
                </div>
                <span class="state-label">完成</span>
            </div>
            
            <div class="state" style="top: 340px; left: 280px;">
                <div class="state-circle" style="background: var(--art-soft-pink);">
                    <span class="state-icon">❌</span>
                    <span class="state-name">Error</span>
                </div>
                <span class="state-label">错误</span>
            </div>
            
            <div class="transition" style="top: 185px; left: 200px; width: 80px;">
                <div class="transition-line" style="width: 80px;">
                    <span class="transition-arrow">▶</span>
                    <span class="transition-label">请求</span>
                </div>
            </div>
            
            <div class="transition" style="top: 185px; left: 380px; width: 80px;">
                <div class="transition-line" style="width: 80px;">
                    <span class="transition-arrow">▶</span>
                    <span class="transition-label">连接成功</span>
                </div>
            </div>
            
            <div class="transition" style="top: 185px; left: 560px; width: 80px;">
                <div class="transition-line" style="width: 80px;">
                    <span class="transition-arrow">▶</span>
                    <span class="transition-label">发送完成</span>
                </div>
            </div>
            
            <div class="transition" style="top: 240px; left: 688px;">
                <div class="transition-line" style="width: 2px; height: 60px; transform: rotate(90deg); transform-origin: top left;">
                    <span class="transition-arrow" style="top: auto; bottom: -8px; right: auto; left: -6px;">▼</span>
                    <span class="transition-label" style="top: 20px; left: 20px;">响应到达</span>
                </div>
            </div>
            
            <div class="transition" style="top: 385px; left: 560px; width: 80px;">
                <div class="transition-line" style="width: 80px;">
                    <span class="transition-arrow">◀</span>
                    <span class="transition-label">完成</span>
                </div>
            </div>
            
            <div class="transition" style="top: 385px; left: 380px; width: 80px;">
                <div class="transition-line" style="width: 80px;">
                    <span class="transition-arrow">◀</span>
                    <span class="transition-label">失败</span>
                </div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot initial"></div>
                <span>初始</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot active"></div>
                <span>活跃</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot waiting"></div>
                <span>等待</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot final"></div>
                <span>终态</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-icon">F</div>
            <span>Feat</span>
        </div>
    </div>
</body>
</html>
