<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手绘风格关系展示 - 900×500</title>
    <style>
        :root {
            --art-warm-cream: #fef9f3;
            --art-soft-pink: #fce4ec;
            --art-lavender: #f3e5f5;
            --art-mint: #e8f5e9;
            --art-peach: #fff3e0;
            --art-sky: #e3f2fd;
            --art-primary: #6b5b95;
            --art-secondary: #f7cac9;
            --art-accent: #88b04b;
            --art-highlight: #ff6f61;
            --art-line: #5d4e37;
            --art-line-light: #8b7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .container {
            width: 900px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: var(--art-warm-cream);
            padding: 40px 50px;
        }
        
        .sketch-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 3px solid var(--art-line);
            border-radius: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--art-line);
        }
        
        .subtitle {
            font-size: 14px;
            color: var(--art-line-light);
            margin-top: 8px;
        }
        
        .content {
            position: relative;
            height: calc(100% - 100px);
            z-index: 1;
        }
        
        .center-node {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: var(--art-lavender);
            border: 4px solid var(--art-line);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        
        .center-icon {
            font-size: 40px;
            margin-bottom: 4px;
        }
        
        .center-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--art-line);
        }
        
        .orbit-node {
            position: absolute;
            width: 90px;
            height: 90px;
            background: var(--art-soft-pink);
            border: 3px solid var(--art-line);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        
        .orbit-node .node-icon {
            font-size: 28px;
            margin-bottom: 2px;
        }
        
        .orbit-node .node-text {
            font-size: 11px;
            font-weight: 500;
            color: var(--art-line);
        }
        
        .orbit-node:nth-child(2) { top: 10%; left: 50%; transform: translateX(-50%); background: var(--art-sky); }
        .orbit-node:nth-child(3) { top: 25%; right: 15%; background: var(--art-mint); }
        .orbit-node:nth-child(4) { bottom: 25%; right: 15%; background: var(--art-peach); }
        .orbit-node:nth-child(5) { bottom: 10%; left: 50%; transform: translateX(-50%); background: var(--art-lavender); }
        .orbit-node:nth-child(6) { bottom: 25%; left: 15%; background: var(--art-soft-pink); }
        .orbit-node:nth-child(7) { top: 25%; left: 15%; background: var(--art-mint); }
        
        .connection-line {
            position: absolute;
            height: 2px;
            background: var(--art-line);
            opacity: 0.4;
            transform-origin: left center;
            z-index: 0;
        }
        
        .deco-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        .deco {
            position: absolute;
            font-size: 18px;
            opacity: 0.4;
        }
        
        .brand {
            position: absolute;
            bottom: 25px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--art-line-light);
            z-index: 1;
        }
        
        .brand-icon {
            width: 28px;
            height: 28px;
            background: var(--art-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 12px;
            border: 2px solid var(--art-line);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sketch-border"></div>
        
        <div class="deco-elements">
            <span class="deco" style="top: 60px; left: 50px;">✨</span>
            <span class="deco" style="top: 70px; right: 60px;">💫</span>
            <span class="deco" style="bottom: 70px; left: 70px;">🌟</span>
            <span class="deco" style="bottom: 60px; right: 50px;">⭐</span>
        </div>
        
        <div class="header">
            <h1 class="title">Feat 生态系统</h1>
            <p class="subtitle">模块间的协作关系</p>
        </div>
        
        <div class="content">
            <div class="center-node">
                <span class="center-icon">🚀</span>
                <span class="center-text">Feat Core</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">🌐</span>
                <span class="node-text">HTTP</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">🤖</span>
                <span class="node-text">AI</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">☁️</span>
                <span class="node-text">Cloud</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">⚡</span>
                <span class="node-text">AOT</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">🔌</span>
                <span class="node-text">Plugin</span>
            </div>
            
            <div class="orbit-node">
                <span class="node-icon">🛡️</span>
                <span class="node-text">Security</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-icon">F</div>
            <span>Feat</span>
        </div>
    </div>
</body>
</html>
