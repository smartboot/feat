<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络拓扑图 - 手绘风格</title>
    <style>
        :root {
            --art-warm-cream: #fef9f3;
            --art-soft-pink: #fce4ec;
            --art-lavender: #f3e5f5;
            --art-mint: #e8f5e9;
            --art-peach: #fff3e0;
            --art-sky: #e3f2fd;
            --art-primary: #6b5b95;
            --art-secondary: #f7cac9;
            --art-accent: #88b04b;
            --art-highlight: #ff6f61;
            --art-line: #5d4e37;
            --art-line-light: #8b7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .container {
            width: 900px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background: var(--art-warm-cream);
            padding: 30px 40px;
        }
        
        .sketch-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 3px solid var(--art-line);
            border-radius: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--art-line);
        }
        
        .subtitle {
            font-size: 13px;
            color: var(--art-line-light);
            margin-top: 6px;
        }
        
        .topology {
            position: relative;
            height: calc(100% - 80px);
            z-index: 1;
        }
        
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .node-box {
            padding: 12px 16px;
            background: white;
            border: 3px solid var(--art-line);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
            position: relative;
        }
        
        .node-box.client {
            background: var(--art-sky);
            border-radius: 8px;
        }
        
        .node-box.gateway {
            background: var(--art-lavender);
            border-width: 4px;
        }
        
        .node-box.service {
            background: var(--art-mint);
        }
        
        .node-box.database {
            background: var(--art-peach);
            border-radius: 8px 8px 24px 24px;
        }
        
        .node-box.cache {
            background: var(--art-soft-pink);
            border-radius: 50%;
            padding: 16px 20px;
        }
        
        .node-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .node-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--art-line);
            text-align: center;
        }
        
        .node-label {
            margin-top: 6px;
            font-size: 9px;
            color: var(--art-line-light);
            background: var(--art-warm-cream);
            padding: 2px 6px;
            border-radius: 3px;
        }
        
        .connection {
            position: absolute;
            height: 2px;
            background: var(--art-line);
            opacity: 0.5;
            transform-origin: left center;
        }
        
        .connection.dashed {
            background: repeating-linear-gradient(
                90deg,
                var(--art-line) 0px,
                var(--art-line) 6px,
                transparent 6px,
                transparent 12px
            );
        }
        
        .connection-label {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--art-primary);
            background: var(--art-warm-cream);
            padding: 1px 4px;
            border-radius: 3px;
            white-space: nowrap;
        }
        
        .cloud {
            position: absolute;
            font-size: 60px;
            opacity: 0.3;
        }
        
        .zone {
            position: absolute;
            border: 2px dashed var(--art-line-light);
            border-radius: 16px;
            opacity: 0.5;
        }
        
        .zone-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 10px;
            color: var(--art-line-light);
            font-weight: 500;
        }
        
        .zone.client-zone {
            top: 80px;
            left: 40px;
            width: 200px;
            height: 120px;
            background: rgba(227, 242, 253, 0.3);
        }
        
        .zone.server-zone {
            top: 80px;
            left: 280px;
            right: 40px;
            height: 420px;
            background: rgba(232, 245, 233, 0.3);
        }
        
        .traffic-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--art-accent);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        
        .deco {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
        }
        
        .brand {
            position: absolute;
            bottom: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--art-line-light);
            z-index: 1;
        }
        
        .brand-icon {
            width: 24px;
            height: 24px;
            background: var(--art-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            border: 2px solid var(--art-line);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sketch-border"></div>
        
        <span class="cloud" style="top: 60px; right: 100px;">☁️</span>
        <span class="cloud" style="top: 100px; right: 250px;">☁️</span>
        
        <span class="deco" style="top: 30px; left: 30px;">🌐</span>
        <span class="deco" style="bottom: 50px; left: 35px;">📡</span>
        <span class="deco" style="bottom: 45px; right: 30px;">🔗</span>
        
        <div class="header">
            <h1 class="title">微服务网络拓扑</h1>
            <p class="subtitle">分布式系统架构的网络连接关系</p>
        </div>
        
        <div class="topology">
            <div class="zone client-zone">
                <span class="zone-label">客户端区域</span>
            </div>
            
            <div class="zone server-zone">
                <span class="zone-label">服务端区域</span>
            </div>
            
            <div class="node" style="top: 100px; left: 80px;">
                <div class="node-box client">
                    <span class="node-icon">🌐</span>
                    <span class="node-name">Web</span>
                </div>
                <span class="node-label">浏览器</span>
            </div>
            
            <div class="node" style="top: 160px; left: 80px;">
                <div class="node-box client">
                    <span class="node-icon">📱</span>
                    <span class="node-name">App</span>
                </div>
                <span class="node-label">移动端</span>
            </div>
            
            <div class="node" style="top: 120px; left: 320px;">
                <div class="node-box gateway">
                    <span class="node-icon">🚪</span>
                    <span class="node-name">Gateway</span>
                </div>
                <span class="node-label">API 网关</span>
            </div>
            
            <div class="node" style="top: 240px; left: 320px;">
                <div class="node-box" style="background: var(--art-soft-pink);">
                    <span class="node-icon">⚖️</span>
                    <span class="node-name">LB</span>
                </div>
                <span class="node-label">负载均衡</span>
            </div>
            
            <div class="node" style="top: 200px; left: 500px;">
                <div class="node-box service">
                    <span class="node-icon">🔧</span>
                    <span class="node-name">Service A</span>
                </div>
                <span class="node-label">核心服务</span>
            </div>
            
            <div class="node" style="top: 200px; left: 650px;">
                <div class="node-box service">
                    <span class="node-icon">🤖</span>
                    <span class="node-name">Service B</span>
                </div>
                <span class="node-label">AI 服务</span>
            </div>
            
            <div class="node" style="top: 200px; left: 800px;">
                <div class="node-box service">
                    <span class="node-icon">☁️</span>
                    <span class="node-name">Service C</span>
                </div>
                <span class="node-label">云服务</span>
            </div>
            
            <div class="node" style="top: 340px; left: 500px;">
                <div class="node-box cache">
                    <span class="node-icon">📦</span>
                    <span class="node-name">Cache</span>
                </div>
                <span class="node-label">Redis</span>
            </div>
            
            <div class="node" style="top: 340px; left: 700px;">
                <div class="node-box cache">
                    <span class="node-icon">📨</span>
                    <span class="node-name">MQ</span>
                </div>
                <span class="node-label">消息队列</span>
            </div>
            
            <div class="node" style="top: 450px; left: 500px;">
                <div class="node-box database">
                    <span class="node-icon">🗄️</span>
                    <span class="node-name">MySQL</span>
                </div>
                <span class="node-label">主库</span>
            </div>
            
            <div class="node" style="top: 450px; left: 700px;">
                <div class="node-box database">
                    <span class="node-icon">🗄️</span>
                    <span class="node-name">MongoDB</span>
                </div>
                <span class="node-label">文档库</span>
            </div>
            
            <div class="traffic-indicator" style="top: 145px; left: 260px;"></div>
            <div class="traffic-indicator" style="top: 145px; left: 460px;"></div>
            <div class="traffic-indicator" style="top: 145px; left: 610px;"></div>
        </div>
        
        <div class="brand">
            <div class="brand-icon">F</div>
            <span>Feat</span>
        </div>
    </div>
</body>
</html>
