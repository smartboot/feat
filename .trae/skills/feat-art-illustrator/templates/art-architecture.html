<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术架构图 - 手绘风格</title>
    <style>
        :root {
            --art-warm-cream: #fef9f3;
            --art-soft-pink: #fce4ec;
            --art-lavender: #f3e5f5;
            --art-mint: #e8f5e9;
            --art-peach: #fff3e0;
            --art-sky: #e3f2fd;
            --art-primary: #6b5b95;
            --art-secondary: #f7cac9;
            --art-accent: #88b04b;
            --art-highlight: #ff6f61;
            --art-line: #5d4e37;
            --art-line-light: #8b7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .container {
            width: 900px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background: var(--art-warm-cream);
            padding: 30px 40px;
        }
        
        .sketch-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 3px solid var(--art-line);
            border-radius: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--art-line);
        }
        
        .subtitle {
            font-size: 13px;
            color: var(--art-line-light);
            margin-top: 6px;
        }
        
        .architecture {
            position: relative;
            height: calc(100% - 90px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1;
        }
        
        .layer {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px dashed var(--art-line);
            position: relative;
        }
        
        .layer-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 12px;
            font-weight: 600;
            color: var(--art-line);
            padding: 8px 4px;
            background: var(--art-soft-pink);
            border-radius: 6px;
            border: 2px solid var(--art-line);
        }
        
        .layer-content {
            flex: 1;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .component {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 16px;
            background: white;
            border: 2px solid var(--art-line);
            border-radius: 10px;
            min-width: 100px;
            position: relative;
        }
        
        .component-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .component-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--art-line);
            text-align: center;
        }
        
        .component.primary {
            background: var(--art-lavender);
            border-color: var(--art-primary);
            border-width: 3px;
        }
        
        .component.secondary {
            background: var(--art-sky);
        }
        
        .component.accent {
            background: var(--art-mint);
        }
        
        .layer.client { background: rgba(227, 242, 253, 0.5); }
        .layer.gateway { background: rgba(243, 229, 245, 0.5); }
        .layer.service { background: rgba(232, 245, 233, 0.5); }
        .layer.data { background: rgba(255, 243, 224, 0.5); }
        
        .connection {
            position: absolute;
            font-size: 16px;
            color: var(--art-primary);
            opacity: 0.6;
        }
        
        .connection.vertical {
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }
        
        .conn-1 { top: -14px; }
        .conn-2 { top: -14px; }
        .conn-3 { top: -14px; }
        
        .annotation {
            position: absolute;
            font-size: 10px;
            color: var(--art-line-light);
            background: var(--art-warm-cream);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px dashed var(--art-line-light);
        }
        
        .deco {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
        }
        
        .brand {
            position: absolute;
            bottom: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--art-line-light);
            z-index: 1;
        }
        
        .brand-icon {
            width: 24px;
            height: 24px;
            background: var(--art-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            border: 2px solid var(--art-line);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sketch-border"></div>
        
        <span class="deco" style="top: 30px; left: 30px;">☁️</span>
        <span class="deco" style="top: 35px; right: 35px;">⚡</span>
        <span class="deco" style="bottom: 50px; left: 35px;">🔧</span>
        <span class="deco" style="bottom: 45px; right: 30px;">💡</span>
        
        <div class="header">
            <h1 class="title">Feat 微服务架构</h1>
            <p class="subtitle">分层架构设计，清晰职责划分</p>
        </div>
        
        <div class="architecture">
            <div class="layer client">
                <span class="layer-label">客户端</span>
                <div class="layer-content">
                    <div class="component">
                        <span class="component-icon">🌐</span>
                        <span class="component-name">Web</span>
                    </div>
                    <div class="component">
                        <span class="component-icon">📱</span>
                        <span class="component-name">Mobile</span>
                    </div>
                    <div class="component">
                        <span class="component-icon">🤖</span>
                        <span class="component-name">AI Agent</span>
                    </div>
                </div>
                <span class="annotation" style="right: 20px; top: 50%; transform: translateY(-50%);">用户入口</span>
            </div>
            
            <span class="connection vertical conn-1">⬇️</span>
            
            <div class="layer gateway">
                <span class="layer-label">网关层</span>
                <div class="layer-content">
                    <div class="component primary">
                        <span class="component-icon">🚪</span>
                        <span class="component-name">API Gateway</span>
                    </div>
                    <div class="component secondary">
                        <span class="component-icon">🛡️</span>
                        <span class="component-name">Auth</span>
                    </div>
                    <div class="component secondary">
                        <span class="component-icon">⚡</span>
                        <span class="component-name">Rate Limit</span>
                    </div>
                </div>
                <span class="annotation" style="right: 20px; top: 50%; transform: translateY(-50%);">统一入口</span>
            </div>
            
            <span class="connection vertical conn-2">⬇️</span>
            
            <div class="layer service">
                <span class="layer-label">服务层</span>
                <div class="layer-content">
                    <div class="component accent">
                        <span class="component-icon">🔧</span>
                        <span class="component-name">Core</span>
                    </div>
                    <div class="component accent">
                        <span class="component-icon">🤖</span>
                        <span class="component-name">AI</span>
                    </div>
                    <div class="component accent">
                        <span class="component-icon">☁️</span>
                        <span class="component-name">Cloud</span>
                    </div>
                    <div class="component accent">
                        <span class="component-icon">🔗</span>
                        <span class="component-name">Hook</span>
                    </div>
                </div>
                <span class="annotation" style="right: 20px; top: 50%; transform: translateY(-50%);">业务逻辑</span>
            </div>
            
            <span class="connection vertical conn-3">⬇️</span>
            
            <div class="layer data">
                <span class="layer-label">数据层</span>
                <div class="layer-content">
                    <div class="component">
                        <span class="component-icon">🗄️</span>
                        <span class="component-name">Database</span>
                    </div>
                    <div class="component">
                        <span class="component-icon">📦</span>
                        <span class="component-name">Cache</span>
                    </div>
                    <div class="component">
                        <span class="component-icon">📨</span>
                        <span class="component-name">MQ</span>
                    </div>
                </div>
                <span class="annotation" style="right: 20px; top: 50%; transform: translateY(-50%);">持久化</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-icon">F</div>
            <span>Feat</span>
        </div>
    </div>
</body>
</html>
