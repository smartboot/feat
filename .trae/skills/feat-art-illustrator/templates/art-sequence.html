<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序图 - 手绘风格</title>
    <style>
        :root {
            --art-warm-cream: #fef9f3;
            --art-soft-pink: #fce4ec;
            --art-lavender: #f3e5f5;
            --art-mint: #e8f5e9;
            --art-peach: #fff3e0;
            --art-sky: #e3f2fd;
            --art-primary: #6b5b95;
            --art-secondary: #f7cac9;
            --art-accent: #88b04b;
            --art-highlight: #ff6f61;
            --art-line: #5d4e37;
            --art-line-light: #8b7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .container {
            width: 900px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background: var(--art-warm-cream);
            padding: 30px 40px;
        }
        
        .sketch-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 3px solid var(--art-line);
            border-radius: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--art-line);
        }
        
        .subtitle {
            font-size: 13px;
            color: var(--art-line-light);
            margin-top: 6px;
        }
        
        .sequence-container {
            position: relative;
            height: calc(100% - 80px);
            z-index: 1;
        }
        
        .participants {
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
            margin-bottom: 10px;
        }
        
        .participant {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .participant-box {
            width: 90px;
            padding: 8px 12px;
            background: var(--art-lavender);
            border: 3px solid var(--art-line);
            border-radius: 8px;
            text-align: center;
        }
        
        .participant-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .participant-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--art-line);
        }
        
        .lifeline {
            position: absolute;
            top: 70px;
            width: 3px;
            height: calc(100% - 100px);
            background: repeating-linear-gradient(
                to bottom,
                var(--art-line) 0px,
                var(--art-line) 8px,
                transparent 8px,
                transparent 16px
            );
            opacity: 0.5;
        }
        
        .lifeline:nth-child(1) { left: 130px; }
        .lifeline:nth-child(2) { left: 340px; }
        .lifeline:nth-child(3) { left: 550px; }
        .lifeline:nth-child(4) { left: 760px; }
        
        .messages {
            position: relative;
            padding-top: 80px;
        }
        
        .message {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .message-line {
            position: absolute;
            height: 2px;
            background: var(--art-line);
            z-index: 1;
        }
        
        .message-arrow {
            position: absolute;
            font-size: 14px;
            color: var(--art-line);
            z-index: 2;
        }
        
        .message-label {
            position: absolute;
            top: -20px;
            font-size: 11px;
            font-weight: 500;
            color: var(--art-line);
            background: var(--art-warm-cream);
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        
        .message-number {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--art-secondary);
            border: 2px solid var(--art-line);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--art-line);
            top: -10px;
            left: -30px;
        }
        
        .msg-1 .message-line { left: 130px; width: 210px; }
        .msg-1 .message-arrow { left: 330px; }
        .msg-1 .message-label { left: 180px; }
        .msg-1 .message-number { left: 100px; }
        
        .msg-2 .message-line { left: 340px; width: 210px; }
        .msg-2 .message-arrow { left: 540px; }
        .msg-2 .message-label { left: 390px; }
        .msg-2 .message-number { left: 310px; }
        
        .msg-3 .message-line { left: 550px; width: 210px; }
        .msg-3 .message-arrow { left: 750px; }
        .msg-3 .message-label { left: 600px; }
        .msg-3 .message-number { left: 520px; }
        
        .msg-4 .message-line { left: 550px; width: 210px; background: var(--art-accent); }
        .msg-4 .message-arrow { left: 550px; transform: scaleX(-1); }
        .msg-4 .message-label { left: 600px; }
        .msg-4 .message-number { left: 520px; }
        
        .msg-5 .message-line { left: 340px; width: 210px; background: var(--art-accent); }
        .msg-5 .message-arrow { left: 340px; transform: scaleX(-1); }
        .msg-5 .message-label { left: 390px; }
        .msg-5 .message-number { left: 310px; }
        
        .msg-6 .message-line { left: 130px; width: 210px; background: var(--art-accent); }
        .msg-6 .message-arrow { left: 130px; transform: scaleX(-1); }
        .msg-6 .message-label { left: 180px; }
        .msg-6 .message-number { left: 100px; }
        
        .activation {
            position: absolute;
            width: 12px;
            background: var(--art-sky);
            border: 2px solid var(--art-line);
            border-radius: 4px;
            z-index: 0;
        }
        
        .activation-1 { left: 125px; top: 140px; height: 400px; }
        .activation-2 { left: 335px; top: 180px; height: 320px; }
        .activation-3 { left: 545px; top: 220px; height: 200px; }
        .activation-4 { left: 755px; top: 260px; height: 80px; }
        
        .note {
            position: absolute;
            background: var(--art-peach);
            border: 2px dashed var(--art-line);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 10px;
            color: var(--art-line);
            max-width: 120px;
        }
        
        .deco {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
        }
        
        .brand {
            position: absolute;
            bottom: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--art-line-light);
            z-index: 1;
        }
        
        .brand-icon {
            width: 24px;
            height: 24px;
            background: var(--art-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            border: 2px solid var(--art-line);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sketch-border"></div>
        
        <span class="deco" style="top: 30px; left: 30px;">⏱️</span>
        <span class="deco" style="top: 35px; right: 35px;">🔄</span>
        <span class="deco" style="bottom: 50px; left: 35px;">📞</span>
        <span class="deco" style="bottom: 45px; right: 30px;">📨</span>
        
        <div class="header">
            <h1 class="title">Hook 调用时序</h1>
            <p class="subtitle">AI Agent 推理过程的 Hook 拦截机制</p>
        </div>
        
        <div class="sequence-container">
            <div class="lifeline"></div>
            <div class="lifeline"></div>
            <div class="lifeline"></div>
            <div class="lifeline"></div>
            
            <div class="participants">
                <div class="participant">
                    <div class="participant-box">
                        <span class="participant-icon">👤</span>
                        <span class="participant-name">User</span>
                    </div>
                </div>
                <div class="participant">
                    <div class="participant-box">
                        <span class="participant-icon">🤖</span>
                        <span class="participant-name">Agent</span>
                    </div>
                </div>
                <div class="participant">
                    <div class="participant-box">
                        <span class="participant-icon">🔗</span>
                        <span class="participant-name">Hook</span>
                    </div>
                </div>
                <div class="participant">
                    <div class="participant-box">
                        <span class="participant-icon">🧠</span>
                        <span class="participant-name">LLM</span>
                    </div>
                </div>
            </div>
            
            <div class="activation activation-1"></div>
            <div class="activation activation-2"></div>
            <div class="activation activation-3"></div>
            <div class="activation activation-4"></div>
            
            <div class="messages">
                <div class="message msg-1">
                    <span class="message-number">1</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">▶</span>
                    <span class="message-label">sendMessage(query)</span>
                </div>
                
                <div class="message msg-2">
                    <span class="message-number">2</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">▶</span>
                    <span class="message-label">beforeHook(context)</span>
                </div>
                
                <div class="message msg-3">
                    <span class="message-number">3</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">▶</span>
                    <span class="message-label">chat(prompt)</span>
                </div>
                
                <div class="message msg-4">
                    <span class="message-number">4</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">◀</span>
                    <span class="message-label">streamResponse</span>
                </div>
                
                <div class="message msg-5">
                    <span class="message-number">5</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">◀</span>
                    <span class="message-label">afterHook(result)</span>
                </div>
                
                <div class="message msg-6">
                    <span class="message-number">6</span>
                    <div class="message-line"></div>
                    <span class="message-arrow">◀</span>
                    <span class="message-label">response</span>
                </div>
            </div>
            
            <div class="note" style="top: 200px; right: 50px;">
                💡 Hook 可拦截并修改推理过程
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-icon">F</div>
            <span>Feat</span>
        </div>
    </div>
</body>
</html>
